name: Dependency Review

# PR-only supply-chain check. Cheap (~30-60s) and catches vulnerable
# transitive deps being added in a PR. Codeql/gitleaks moved to a weekly
# schedule in security.yml, but dependency-review still belongs here
# because PR time is when new dependencies are introduced.

on:
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      # requirements.txt is intentionally NOT excluded — pip Dependabot PRs
      # must pass this check before merging.

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dep-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - name: Dependency Review
        # continue-on-error keeps this advisory until the dependency graph and
        # GHAS are enabled. It must be on the step, not the job — GitHub does
        # not support continue-on-error on reusable-workflow caller jobs.
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: low
          comment-summary-in-pr: on-failure
