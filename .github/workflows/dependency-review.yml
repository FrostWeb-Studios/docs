name: Dependency Review

# PR-only supply-chain check. Cheap (~30-60s) and catches vulnerable
# transitive deps being added in a PR. Codeql/gitleaks moved to a weekly
# schedule in security.yml, but dependency-review still belongs here
# because PR time is when new dependencies are introduced.

on:
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      # requirements.txt is intentionally NOT excluded — pip Dependabot PRs
      # must pass this check before merging.

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dep-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    # Dependency review is not supported without GHAS; use the lowest valid
    # severity threshold (low) so the job is advisory until the dependency
    # graph and GHAS are enabled at the repo/org level. Without GHAS the
    # action finds no vulnerabilities and always passes regardless of this
    # setting. ("none" was removed as a valid value in dependency-review-action v4.)
    permissions:
      contents: read
      pull-requests: write
    uses: FrostWeb-Studios/.github/.github/workflows/reusable-dependency-review.yml@1d9b0a001d985e3613a6949c3cd491124a040dce # v1
    with:
      fail-on-severity: low
