name: Security

# Weekly + manual only. PR-time dependency-review is in its own file
# (dependency-review.yml). Gitleaks moved off PR triggers — the weekly
# schedule catches the same things without taxing every PR.

on:
  schedule:
    - cron: "27 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# CodeQL omitted: this repo's language isn't supported by the upstream
# CodeQL action. Gitleaks still applies.
jobs:
  secret-scan:
    continue-on-error: false
    permissions:
      contents: read
    uses: FrostWeb-Studios/.github/.github/workflows/reusable-gitleaks.yml@1d9b0a001d985e3613a6949c3cd491124a040dce # v1
