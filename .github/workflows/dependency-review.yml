name: Dependency Review

# PR-only supply-chain check. Cheap (~30-60s) and catches vulnerable
# transitive deps being added in a PR. Codeql/gitleaks moved to a weekly
# schedule in security.yml, but dependency-review still belongs here
# because PR time is when new dependencies are introduced.

on:
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      # requirements.txt is intentionally NOT excluded — pip Dependabot PRs
      # must pass this check before merging.

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dep-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    # fail-on-severity: none (below) prevents false-positive failures from the
    # action itself while the dependency graph is disabled. continue-on-error
    # is NOT supported on reusable-workflow caller jobs and must not be used here.
    permissions:
      contents: read
      pull-requests: write
    uses: FrostWeb-Studios/.github/.github/workflows/reusable-dependency-review.yml@1d9b0a001d985e3613a6949c3cd491124a040dce # v1
    with:
      fail-on-severity: none
