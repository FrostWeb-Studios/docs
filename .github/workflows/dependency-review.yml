name: Dependency Review

# PR-only supply-chain check. Cheap (~30-60s) and catches vulnerable
# transitive deps being added in a PR. Codeql/gitleaks moved to a weekly
# schedule in security.yml, but dependency-review still belongs here
# because PR time is when new dependencies are introduced.

on:
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      # requirements.txt is intentionally NOT excluded — pip Dependabot PRs
      # must pass this check before merging.

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dep-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        # The dependency graph is not enabled on this repository, so the action
        # always errors with "not supported". Allow failure until it's enabled
        # in Settings → Security & Analysis → Dependency graph.
        continue-on-error: true
        with:
          fail-on-severity: high
