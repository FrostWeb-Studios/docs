name: Close Stale Issues and PRs

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,help wanted,roadmap"
          exempt-pr-labels: "pinned,security,wip"
          stale-issue-message: |
            This issue has had no activity for 60 days and is being marked stale.
            Comment to keep it open, or it will close in 14 days.
          stale-pr-message: |
            This PR has had no activity for 30 days and is being marked stale.
            Push a commit or comment to keep it open, or it will close in 14 days.
