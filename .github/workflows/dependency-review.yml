name: Dependency Review

# PR-only supply-chain check. Cheap (~30-60s) and catches vulnerable
# transitive deps being added in a PR. Codeql/gitleaks moved to a weekly
# schedule in security.yml, but dependency-review still belongs here
# because PR time is when new dependencies are introduced.

on:
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      # requirements.txt is intentionally NOT excluded — pip Dependabot PRs
      # must pass this check before merging.

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dep-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        # Requires GHAS (dependency graph) on private repos. Skip failures only
        # when the repo is private AND GHAS is not enabled — that combination
        # produces "Dependency review is not supported on this repository."
        # Private repos WITH GHAS should still fail hard on findings.
        continue-on-error: ${{ github.event.pull_request.base.repo.visibility != 'public' && github.event.pull_request.base.repo.security_and_analysis.advanced_security.status != 'enabled' }}
        with:
          fail-on-severity: high
