name: Deploy Documentation

on:
  push:
    branches:
      - LIVE
  workflow_dispatch:

permissions:
  contents: write
  # NOTE: pages: write and id-token: write are NOT included here.
  # This workflow uses "mike deploy --push" which writes directly to the
  # gh-pages git branch and only needs contents: write. Those two permissions
  # are only required for the actions/deploy-pages + actions/configure-pages
  # flow, which this workflow does not use.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy with mike
        run: |
          mike deploy --push --update-aliases latest
          mike set-default --push latest
